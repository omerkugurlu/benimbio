<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ömer Küçükeruğurlu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --gradient-1: #f093fb;
  --gradient-2: #f5576c;
  --gradient-3: #4facfe;
  --gradient-4: #00f2fe;
  --bg-dark: #0f0f1a;
  --bg-card: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --text: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.5);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 40%),
    radial-gradient(circle at 40% 70%, rgba(79, 172, 254, 0.08) 0%, transparent 30%);
  animation: float 20s ease-in-out infinite;
  z-index: -1;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(30px, -30px) rotate(5deg); }
  66% { transform: translate(-20px, 20px) rotate(-5deg); }
}

.container {
  width: 100%;
  max-width: 400px;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

.card {
  background: var(--bg-card);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 28px;
  padding: 40px 28px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 
    0 25px 50px -12px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.profile-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 24px;
}

.profile {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid transparent;
  background: 
    linear-gradient(var(--bg-dark), var(--bg-dark)) padding-box,
    linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3)) border-box;
  object-fit: cover;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
  50% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
}

h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.role {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 12px;
  font-weight: 400;
}

.bio {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 32px;
  max-width: 280px;
  margin-left: auto;
  margin-right: auto;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 28px 0;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 16px 20px;
  border-radius: 16px;
  text-decoration: none;
  color: var(--text);
  font-weight: 500;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: -1;
}

.btn:hover::before {
  opacity: 1;
}

.btn:hover {
  transform: translateY(-2px);
  border-color: transparent;
  box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.5);
}

.btn:active {
  transform: scale(0.98);
}

.btn-icon {
  font-size: 20px;
  width: 24px;
  text-align: center;
}

.btn-text {
  flex: 1;
  text-align: left;
}

.btn-arrow {
  font-size: 18px;
  opacity: 0.5;
  transition: all 0.3s ease;
}

.btn:hover .btn-arrow {
  opacity: 1;
  transform: translateX(4px);
}

@media (max-width: 380px) {
  .card {
    padding: 32px 20px;
  }
  
  h1 {
    font-size: 22px;
  }
  
  .btn {
    padding: 14px 16px;
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    
    <h1>Ömer Küçükeruğurlu</h1>
    <p class="role">İletişim</p>
    <p class="bio">Merhaba! Benimle iletişime geçmek veya sosyal medyadan takip etmek için aşağıdaki linkleri kullanabilirsiniz.</p>
    
    <div class="divider"></div>
    
    <div class="links">
      <a class="btn" href="https://instagram.com/omerugrl0" target="_blank">
        <span class="btn-icon">📸</span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">→</span>
      </a>
      
      <a class="btn" href="tel:+905488209894">
        <span class="btn-icon">📞</span>
        <span class="btn-text">Telefon</span>
        <span class="btn-arrow">→</span>
      </a>
      
      <a class="btn" href="mailto:omerkugurlu@icloud.com">
        <span class="btn-icon">📧</span>
        <span class="btn-text">E-posta</span>
        <span class="btn-arrow">→</span>
      </a>
    </div>
    
  </div>
</div>

</body>
</html>
