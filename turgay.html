<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Turgay Küçükeruğurlu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1f1f2e, #2c2c3a);
  color: white;

  /* mobil ortalama */
  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  padding: 20px;
}

/* iPhone safe area */
.container {
  width: 100%;
  max-width: 380px;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

/* Kart */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  border-radius: 22px;
  padding: 28px 22px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Profil */
.profile {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
}

h1 {
  font-size: 20px;
  font-weight: 600;
}

.bio {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 25px;
}

/* Butonlar */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;

  width: 100%;
  padding: 15px;
  margin: 10px 0;

  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: 500;

  background: rgba(255,255,255,0.08);
  transition: 0.2s;
}

/* mobil dokunma efekti */
.btn:active {
  transform: scale(0.97);
  background: rgba(255,255,255,0.15);
}

/* hover (pc için) */
@media (hover: hover) {
  .btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.15);
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <img class="profile" src="https://i.ibb.co/7d6gGJgD/MG-0018.png">

    <h1>Turgay Küçükeruğurlu</h1>
    <p class="bio"><b>Garanti bankası şube müdürü</b></p>

    <a class="btn" href="https://instagram.com/turgayug">📸 Instagram</a>
    <a class="btn" href="tel:+905491316085">📞 Telefon</a>
    <a class="btn" href="mailto:turgayug@gmail.com">📧 E-posta</a>

  </div>
</div>

</body>
</html>
